version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chamo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?configure_mysql_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chamo}
      MYSQL_USER: ${MYSQL_USER:-chamo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?configure_mysql_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
